<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Superpoderes</title>
  <link rel="icon" href="data:," />
  <link rel="stylesheet" href="styles.css" />
</head>

<body>

  <!-- HEADER -->
  <header>
    <h1>Superpoderes</h1>
  </header>

  <!-- MAIN -->
  <main>

    <p class="label">Descubridor de poderes</p>
    <h2>¿Cuál es tu poder hoy?</h2>

    <!-- Card poder actual -->
    <section class="card-poder">
      <p id="nombre">Toca el botón</p>
    </section>

    <button id="btnDescubrir">Descubrir mi poder</button>

    <!-- Card contador -->
    <article class="card-contador">
      <span>Intentos realizados</span>
      <p id="contador"><strong>0</strong></p>
    </article>

    <!-- Lista de poderes -->
    <p class="lista-label">Todos los poderes</p>
    <ul id="lista">
      <li data-i="0">Volar</li>
      <li data-i="1">Invisibilidad</li>
      <li data-i="2">Teletransportación</li>
      <li data-i="3">Control del tiempo</li>
      <li data-i="4">Super fuerza</li>
    </ul>

  </main>

  <!-- FOOTER -->
  <footer>
    <p>Jeaustin Hernandez</p>
    <p>© 2026</p>
  </footer>

  <script src="script.js"></script>
</body>

</html>
